<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monochrome Palette Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <h1>Monochrome Palette Generator</h1>

      <div class="controls">
        <div class="slider-group">
          <label>
            Hue: <span id="hue-value">180</span>°
          </label>
          <input type="range" id="hue" min="0" max="360" value="180" step="15" />
        </div>

        <div class="slider-group">
          <label>
            Saturation: <span id="sat-value">30</span>%
          </label>
          <input type="range" id="saturation" min="0" max="100" value="30" step="5" />
        </div>

        <div class="slider-group">
          <label>
            Light Steps: <span id="steps-value">8</span>
          </label>
          <input type="range" id="steps" min="2" max="51" value="8" step="1" />
        </div>

        <div class="slider-group">
          <label>
            Light Range: <span id="range-value">80</span>%
          </label>
          <input type="range" id="range" min="0" max="100" value="80" step="2" />
        </div>

        <div class="slider-group">
          <label>
            Light Shift: <span id="shift-value">16</span>%
          </label>
          <input type="range" id="shift" min="0" max="20" value="16" step="2" />
        </div>

        <div class="slider-group">
          <label>Chroma Curve</label>
          <div class="curve-group">
            <label><input type="radio" name="curve" value="linear" /> Linear</label>
            <label><input type="radio" name="curve" value="parabolic" /> Parabolic</label>
            <label><input type="radio" name="curve" value="bell" checked /> Bell</label>
            <label><input type="radio" name="curve" value="asymmetric" /> Asymmetric</label>
          </div>
        </div>

        <div class="slider-group">
          <label>Lightness Curve</label>
          <div class="curve-group">
            <label><input type="radio" name="lightCurve" value="linear" checked /> Linear</label>
            <label><input type="radio" name="lightCurve" value="easeOut" /> Ease-Out</label>
            <label><input type="radio" name="lightCurve" value="easeIn" /> Ease-In</label>
            <label><input type="radio" name="lightCurve" value="smooth" /> Smooth</label>
          </div>
        </div>

        <div class="slider-group">
          <label>Color Space</label>
          <button id="mode" class="btn" data-mode="oklch">OKLCH</button>
        </div>

        <div class="slider-group">
          <label>&nbsp;</label>
          <button id="export" class="btn">Export PNG</button>
        </div>
      </div>

      <div id="colors" class="colors"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
